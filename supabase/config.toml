# Supabase project configuration as code (audit: DevOps / reproducibility).
# Reconcile `project_id` with the real linked project before `supabase link`.

project_id = "tradeflow"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Set to the deployed site URL; used for invite/confirmation redirect links.
site_url = "https://tradeflowmanager.com"
additional_redirect_urls = ["https://tradeflowmanager.com", "http://localhost:8081"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Edge functions. verify_jwt = true makes the gateway reject unauthenticated
# calls before they reach the function — defence-in-depth on top of the auth
# checks each function performs (audit S-C1/S-H2).
[functions.send-job-card]
verify_jwt = true

[functions.send-employee-invite]
verify_jwt = true

[functions.delete-account]
verify_jwt = true

[functions.export-account-data]
verify_jwt = true
